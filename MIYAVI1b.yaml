# ================================
# MIYAVI-fallback-smart方案 - 最终版7.26
# ================================

# ========================
# 代理提供商的公共设置
# ========================
Common Proxy Settings: &cps
  type: http  # 代理类型为HTTP
  # 调整订阅更新间隔为24小时，及时获取最新节点
  interval: 86400  # 订阅更新间隔，单位为秒，这里是24小时（24 * 60 * 60 = 86400）
  health-check: 
    enable: true  # 启用健康检查
    url: https://www.gstatic.com/generate_204  # 健康检查的URL
    # 缩短健康检查间隔，更频繁检查节点状态
    interval: 250  # 健康检查间隔，单位为秒

# =======================================================
# 代理提供商 (Proxy Providers) - 定义从外部订阅获取代理节点
# =======================================================
proxy-providers:
  🇭🇰: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广港|香港|HK|Hong Kong|🇭🇰|HongKong', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇹🇼: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇯🇵: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇰🇷: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇸🇬: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广新|新加坡|SG|坡|狮城|🇸🇬|Singapore', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇺🇸: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇬🇧: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {additional-prefix: '英国|英|伦敦|UK|United Kingdom|🇬🇧|London', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇭🇰-🇸🇬: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {proxy: '直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|英国|UK|United Kingdom|伦敦|英|London|🇬🇧', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}
  🇺🇸-🇬🇧: {<<: *cps, url: 'https://raw.githubusercontent.com/himnk3/H34v3n/refs/heads/main/FULL.yaml', override: {direct: 'DIRECT|直连|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author', smux: {enabled: true, protocol: h2mux, max-connections: 4, min-streams: 8, statistic: false, only-tcp: false, padding: true}}}

# ========================
# 代理节点定义 (Proxies) - 定义内置或静态代理节点
# ========================
proxies:
  - {name: 直连, type: direct}  # 直连模式节点
  - {name: 拒绝, type: reject}  # 拒绝模式节点

# ========================
# 通用设置及主要端口 - Clash核心运行参数
# ========================
log-level: warning  # 日志级别为警告
mode: rule  # 运行模式为规则模式
ipv6: true  # 启用IPv6支持
unified-delay: true  # 启用统一延迟
tcp-concurrent: true  # 启用TCP并发
# 调整TCP连接空闲超时时间
keep-alive-idle: 600 # TCP连接空闲超时时间，单位为秒
# 调整TCP连接保活间隔
keep-alive-interval: 15  # TCP连接保活间隔，单位为秒

allow-lan: true  # 允许局域网连接
port: 7890  # HTTP代理端口
socks-port: 7891  # SOCKS5代理端口
mixed-port: 7893  # 混合代理端口
redir-port: 7892  # 重定向代理端口
tproxy-port: 7895  # TProxy代理端口

# 新增参数：优化HTTP连接池
http-conn-pool:
  max-idle-conns: 100
  idle-conn-timeout: 90s

# 新增参数：设置UDP超时时间
udp-timeout: 60s

# ========================
# TUN 模块配置 - 透明代理功能
# ========================
tun:
  enable: true  # 启用TUN模块
  device: utun  # TUN设备名称
  stack: mixed  # 协议栈类型为混合
  mtu: 9000  # 最大传输单元
  auto-route: false  # 禁用自动路由
  auto-redirect: false  # 禁用自动重定向
  auto-detect-interface: false  # 禁用自动检测接口
  endpoint-independent-nat: true  # 启用端点独立NAT

# ========================
# DNS 配置 - 域名解析设置
# ========================
dns:
  enable: true  # 启用DNS功能
  listen: 0.0.0.0:7874  # DNS监听地址和端口
  ipv6: true  # 启用IPv6 DNS支持
  enhanced-mode: fake-ip  # 增强模式为伪造IP
  fake-ip-range: 198.20.0.1/16  # 伪造IP地址范围
  fake-ip-filter-mode: blacklist  # 伪造IP过滤模式为黑名单
  default-nameserver:  # 默认DNS服务器
    - 223.5.5.5  # 阿里云DNS
  proxy-server-nameserver:  # 代理服务器使用的DNS
    - 223.5.5.5  # 阿里云DNS
  direct-nameserver:  # 直连使用的DNS
    - https://doh.pub/dns-query  # 腾讯云DoH
    - https://223.5.5.5/dns-query  # 阿里云DoH
    - https://doh.360.cn/dns-query  # 360安全DNS
  nameserver:  # 主DNS服务器
    - "https://8.8.8.8/dns-query#PROXY&ecs=120.76.0.0/14&ecs-override=true"  # Google DNS over HTTPS，通过代理连接，启用ECS
  fake-ip-filter:
  - 'localhost'  # 本地回环地址，通常指向 127.0.0.1
  - 'www.msftconnecttest.com'  # 微软网络连接测试域名
  - 'www.msftncsi.com'  # 微软网络连接状态指示器域名
  - '+.lan'  # 局域网域名后缀（+ 表示精确匹配）
  - '+.local'  # mDNS 本地域名后缀
  - '+.msftconnecttest.com'  # 微软网络测试相关域名
  - '+.msftncsi.com'  # 微软网络状态检测相关域名
  - '+.nflxvideo.net'  # 奈飞视频内容分发域名
  - '*.bt-tracker.*'  # BitTorrent 种子 tracker 服务器
  - '*.steamcontent.com'  # Steam 游戏内容分发域名
  - 'time.*.com'  # 时间同步服务相关域名
  - 'geosite:connectivity-check'  # 系统预定义的网络连接检测域名组
  - 'geosite:private'  # 系统预定义的私有网络域名组
  - 'geosite:cn'  # 系统预定义的中国大陆域名组
  # 新增参数：设置DNS缓存时间
  cache-ttl: 300

# 新增参数：设置DNS预解析
pre-resolve-hosts:
  - "google.com"
  - "facebook.com"

profile:
  store-selected: true  # 保存所选策略
  store-fake-ip: true  # 保存伪造IP

# ========================
# 外部控制及UI设置
# ========================
external-controller: 0.0.0.0:9090  # 外部控制器地址和端口
external-ui: ui  # 外部UI目录
external-ui-name: zashboard  # 外部UI名称
external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip  # 外部UI下载URL
secret: "123456"  # 外部控制器访问密钥

# ========================
# Geo 数据管理 - 地理数据文件（GeoIP/GeoSite）的设置
# ========================
geodata-mode: false  # 禁用Geo数据模式
geodata-loader: standard  # Geo数据加载器类型为标准
geo-auto-update: true  # 启用Geo数据自动更新
# 调整Geo数据更新间隔为24小时
geo-update-interval: 24  # Geo数据更新间隔，单位为小时
geox-url:
  geosite: https://gh-proxy.com/github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat  # GeoSite数据文件下载URL
  mmdb:    https://gh-proxy.com/github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb  # GeoIP Lite数据文件下载URL
  geoip:   https://gh-proxy.com/raw.githubusercontent.com/sapics/ip-location-db/refs/heads/main/geolite2-country-mmdb/geolite2-country.mmdb  # GeoIP数据文件下载URL
  asn:     https://gh-proxy.com/raw.githubusercontent.com/sapics/ip-location-db/refs/heads/main/geolite2-asn-mmdb/geolite2-asn.mmdb  # GeoASN数据文件下载URL

# ========================
# 策略组定义 (Proxy Groups) - 组织代理节点和路由逻辑
# 必须在 Rules 和 Rule Providers 之前定义
# 默认代理策略组（包含多种区域和类型的代理节点）
default-proxies: &dp
  type: select  # 策略组类型为选择
  proxies: [直连, 所有-智选, 港台日新韩-故转, 港台日新韩-智选, 台日新韩-故转, 台日新韩-智选, 台日新韩AI-智选, 香港-故转, 香港-智选, 台湾-故转, 日本-故转, 新加坡-故转, 韩国-故转, 美国-故转, 美国-智选, 美国AI-智选, 其他-故转, 拒绝]  # 策略组包含的代理节点
# 仅包含直连和拒绝的策略组（用于不需要代理的场景）
default-direct: &dr
  type: select  # 策略组类型为选择
  proxies: [直连, 拒绝]  # 策略组包含的代理节点

smart-defaults: &sd
  type: smart  # 策略组类型为智能
  include-all: true  # 包含所有匹配的节点
  policy-priority: UK:1.8;HK:1.6;SG:1.5;JP:1.3;TW:1.1  # 策略优先级设置
  uselightgbm: true  # 启用LightGBM模型
  collectdata: true  # 启用数据收集
  health-check:  # 健康检查配置
    enable: true  # 启用定期健康检查
    url: https://www.gstatic.com/generate_204  # 使用Google的204状态码检测URL
    interval: 60  # 检查间隔为60秒
    tolerance: 2  # 允许的最大延迟波动范围
  strategy: sticky-sessions  # 使用粘性会话策略
  interval: 250  # 节点评估时间间隔为250秒

proxy-groups:
  - {name: AI, <<: *dp}  # AI策略组，引用默认策略组设置
  - {name: Meta AI, <<: *dp}  # AI策略组，引用默认策略组设置
  - {name: Perplexity, <<: *dp}  # AI策略组，引用默认策略组设置
  - {name: GitHub, <<: *dp}  # GitHub策略组，引用默认策略组设置
  - {name: Telegram, <<: *dp}  # Telegram策略组，引用默认策略组设置
  - {name: YouTube, <<: *dp}  # YouTube策略组，引用默认策略组设置
  - {name: 流媒体, <<: *dp}  # 流媒体策略组，引用默认策略组设置
  - {name: Google, <<: *dp}  # Google策略组，引用默认策略组设置
  - {name: Microsoft, <<: *dp}  # Microsoft策略组，引用默认策略组设置
  - {name: 美企, <<: *dp}  # 美企策略组，引用默认策略组设置
  - {name: 检测, <<: *dp}  # 检测策略组，引用默认策略组设置
  - {name: 国外, <<: *dp}  # 国外策略组，引用默认策略组设置
  - {name: 国内, <<: *dr}  # 国内策略组，引用默认策略组设置
  - {name: Block, <<: *dr}  # 阻止策略组，引用默认策略组设置

  - name: 所有-智选
    <<: *sd  # 引用智能策略组默认设置
    filter: "^((?!(直连|拒绝|官网|到期|失败|剩余|异常)).)*$" # 过滤包含关键字的节点，只在代理节点中进行选择

  - name: 港台日新韩-故转
    type: fallback  # 策略组类型为回退
    # 缩短节点检测间隔
    interval: 250  # 节点检测间隔，单位为秒
    lazy: false  # 不使用懒加载
    proxies:
      - 港台日新韩-手选  # 手动选择的港台日新韩节点
      - 港台日新韩-智选  # 智能选择的港台日新韩节点
  - name: 港台日新韩-手选
    type: select  # 策略组类型为选择
    include-all: true  # 包含所有匹配的节点
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea))(?!.*(官网|到期|失败|剩余|异常)).*$"  # # 过滤规则，匹配港台日新韩节点并排除特定关键字
  - name: 港台日新韩-智选
    <<: *sd  # 引用智能策略组默认设置
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea))(?!.*(官网|到期|失败|剩余|异常)).*$"  # # 过滤规则，匹配港台日新韩节点并排除特定关键字

  - name: 台日新韩-故转
    type: fallback  # 策略组类型为回退
    interval: 250  # 节点检测间隔，单位为秒
    lazy: false  # 不使用懒加载
    proxies:
      - 台日新韩-手选  # 手动选择的台日新韩节点
      - 台日新韩-智选  # 智能选择的台日新韩节点
      - 台日新韩AI-智选  # 智能选择的台日新韩节点

  - name: 台日新韩-手选
    type: select  # 策略组类型为选择
    include-all: true  # 包含所有匹配的节点
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea))(?!.*(官网|到期|失败|剩余|异常)).*$"  # # 过滤规则，匹配台日新韩节点并排除特定关键字
  - name: 台日新韩-智选
    <<: *sd  # 引用智能策略组默认设置
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea))(?!.*(官网|到期|失败|剩余|异常)).*$"  # # 过滤规则，匹配台日新韩节点并排除特定关键字
  - name: 台日新韩AI-智选
    <<: *sd  # 引用智能策略组默认设置
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*(?=.*(NF|奈飞|解锁|Netflix|NETFLIX|Media|GPT|AI|游戏|GAME))(?!.*(官网|到期|失败|剩余|异常)).*$"  # 双重过滤，匹配台日新韩节点

  - name: 香港-故转
    type: fallback  # 策略组类型为回退
    interval: 250  # 节点检测间隔，单位为秒
    lazy: false  # 不使用懒加载
    proxies:
      - 香港-手选  # 手动选择的香港节点
      - 香港-智选  # 智能选择的香港节点
  - name: 香港-手选
    type: select  # 策略组类型为选择
    include-all: true  # 包含所有匹配的节点
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong))(?!.*(官网|到期|失败|剩余|异常)).*$"  # 过滤规则，匹配香港节点并排除特定关键字
  - name: 香港-智选
    <<: *sd  # 引用智能策略组默认设置
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong))(?!.*(官网|到期|失败|剩余|异常)).*$"  # 过滤规则，匹配香港节点并排除特定关键字

  - name: 台湾-故转
    type: fallback  # 策略组类型为回退
    interval: 250  # 节点检测间隔，单位为秒
    lazy: false  # 不使用懒加载
